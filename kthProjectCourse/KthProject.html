<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airchestra</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
    }

    body {
      background-color: #0f0f11;
      font-family: system-ui, sans-serif;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }

    .hero p {
      color: #888890;
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    .team {
      position: relative;
      z-index: 1;
      padding: 100px 40px 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
    }

    .team h2 {
      color: rgba(255, 255, 255, 0.75);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .team-row {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      gap: 36px;
    }

    .member {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex: 0 0 auto;
    }

    .member img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      background-color: #1e1e22;
      border: 1.5px solid rgba(255, 120, 40, 0.25);
      display: block;
    }

    .member-info {
      text-align: center;
    }

    .member-name {
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .member-role {
      color: rgba(255, 120, 40, 0.7);
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    .divider {
      position: relative;
      z-index: 1;
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, transparent, rgba(255,120,40,0.3), transparent);
      margin: 0 auto;
    }

    @media (max-width: 700px) {
      .team-row {
        flex-direction: column;
        align-items: center;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <section class="hero">
    <img src="Airchestra.svg" width="320" height="240" alt="Logo" />
    <p>WORK IN PROGRESS</p>
  </section>

  <div class="divider"></div>

  <section class="team">
    <h2>The Team</h2>
    <div class="team-row">

      <div class="member">
        <img src="Mugshots/IMG_20260415_163658.jpg" alt="Member 1" />
        <div class="member-info">
          <div class="member-name">Sachin Prabhu Ram</div>
          <div class="member-role">Engagement Strategist</div>
        </div>
      </div>

      <div class="member">
        <img src="Mugshots/IMG_20260415_163705.jpg" alt="Member 2" />
        <div class="member-info">
          <div class="member-name">Stanislaw Jerzy Rybak</div>
          <div class="member-role">Waving Quality Expert</div>
        </div>
      </div>

      <div class="member">
        <img src="Mugshots/IMG_20260415_163710.jpg" alt="Member 3" />
        <div class="member-info">
          <div class="member-name">Raghav Khurana</div>
          <div class="member-role">Senior Scrum Associate</div>
        </div>
      </div>

      <div class="member">
        <img src="Mugshots/IMG_20260415_163722.jpg" alt="Member 4" />
        <div class="member-info">
          <div class="member-name">Dajue Qiu</div>
          <div class="member-role">Tech Ops Node Yield</div>
        </div>
      </div>

      <div class="member">
        <img src="Mugshots/IMG_20260415_163736.jpg" alt="Member 5" />
        <div class="member-info">
          <div class="member-name">Petros Efraim Koukios</div>
          <div class="member-role">Petros</div>
        </div>
      </div>

      <div class="member">
        <img src="Mugshots/IMG_20260415_163749.jpg" alt="Member 6" />
        <div class="member-info">
          <div class="member-name">Alex Rystrom</div>
          <div class="member-role">Senior Product Responsible</div>
        </div>
      </div>

      <div class="member">
        <img src="Mugshots/IMG_20260415_163845.jpg" alt="Member 7" />
        <div class="member-info">
          <div class="member-name">Sebastian Tryscien</div>
          <div class="member-role">Orange Color Expert</div>
        </div>
      </div>

    </div>
  </section>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const DOT_COUNT = 80;
    const dots = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function randomBetween(a, b) {
      return a + Math.random() * (b - a);
    }

    for (let i = 0; i < DOT_COUNT; i++) {
      dots.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: randomBetween(1, 2.5),
        opacity: randomBetween(0.2, 0.6),
        vx: randomBetween(-0.3, 0.3),
        vy: randomBetween(-0.3, 0.3),
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const d of dots) {
        d.x += d.vx;
        d.y += d.vy;

        if (d.x < -5) d.x = canvas.width + 5;
        if (d.x > canvas.width + 5) d.x = -5;
        if (d.y < -5) d.y = canvas.height + 5;
        if (d.y > canvas.height + 5) d.y = -5;

        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 120, 40, ${d.opacity})`;
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener('resize', resize);
    draw();
  </script>

</body>
</html>
